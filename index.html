<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our 100th Day 💝</title>
    <style>
        /* 1. Basic Cute Theme Setup */
        body {
            background-color: #ffe6ea; /* Soft pink background */
            font-family: 'Comic Sans MS', 'Arial Rounded MT Bold', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            color: #5a3a40;
        }

        /* 2. Site Opening Animation */
        .website-container {
            animation: siteOpenFade 2s ease-in-out;
        }

        @keyframes siteOpenFade {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* 3. The Book Structure */
        .book {
            position: relative;
            width: 350px;
            height: 500px;
            perspective: 1500px; /* Required for the 3D flip effect */
        }

        /* 4. The Cover (Lock Screen) */
        .cover {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffb3c6, #ff8fab);
            border-radius: 10px 25px 25px 10px;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.2);
            transform-origin: left; /* Makes it open from the left spine */
            transition: transform 1.5s ease-in-out; /* Smooth flipping animation */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 2;
            padding: 20px;
            box-sizing: border-box;
            cursor: pointer;
        }

        /* This class is added by JavaScript when the book is unlocked */
        .cover.open {
            transform: rotateY(-130deg); /* Flips the cover open */
        }

        /* 5. Inside Content */
        .inside {
            position: absolute;
            width: 100%;
            height: 100%;
            background: #fff0f3;
            border-radius: 10px 25px 25px 10px;
            box-shadow: inset 2px 0 10px rgba(0,0,0,0.1);
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            overflow-y: auto;
            z-index: 1;
        }

        /* 6. Animations for text and photos */
        .animate-text {
            animation: pulseText 2s infinite alternate;
        }

        @keyframes pulseText {
            from { transform: scale(1); }
            to { transform: scale(1.05); color: #d62828; }
        }

        .photos {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .photo {
            width: 130px;
            height: 130px;
            object-fit: cover;
            border-radius: 15px;
            border: 4px solid white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            animation: floatPhoto 3s infinite ease-in-out alternate;
        }

        /* Delay the second photo's animation so they float differently */
        .photo:nth-child(2) {
            animation-delay: 1.5s;
        }

        @keyframes floatPhoto {
            from { transform: translateY(0px); }
            to { transform: translateY(-10px); }
        }

        /* 7. UI Elements */
        #countdown {
            font-size: 1.2rem;
            margin: 20px 0;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.5);
            padding: 10px;
            border-radius: 10px;
        }

        #lock-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        #early-message {
            opacity: 0; /* Hidden by default */
            color: #d81159;
            font-weight: bold;
            transition: opacity 0.3s;
            background: white;
            padding: 8px;
            border-radius: 8px;
        }
        
        .end-message {
            margin-top: auto;
            margin-bottom: 10px;
            font-size: 0.9rem;
            color: #888;
            animation: fadeInEnd 4s ease-in;
        }
        
        @keyframes fadeInEnd {
            0% { opacity: 0; }
            80% { opacity: 0; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="website-container">
    <div class="book">
        <div id="cover" class="cover">
            <h1>Our 100th Day</h1>
            <div id="countdown">Calculating...</div>
            <div id="lock-icon">🔒</div>
            <p id="early-message">Not the time yet! Wait for the day cutie! 🐾</p>
        </div>

        <div id="inside" class="inside">
            <h2 class="animate-text">Happy 100 Days! 💝</h2>
            <p>Thank you for the most amazing days. Here is to many more!</p>
            
            <div class="photos">
                <img src="1.jpg" alt="Us Image 1" class="photo">
                <img src="2.jpg" alt="Us Image 2" class="photo">
            </div>
            
            <p class="end-message">I love you! 💕</p>
        </div>
    </div>
</div>

<script>
    // --- TESTING MODE ---
    // Keep this as "" to lock the book. 
    // Change it to anything else (like "") to unlock the book for testing!
    const lockKeyword = "Ayu"; 
    // --------------------

    // 1. Set the REAL meeting date (Jan 18, 2026) to hit the 100th day on April 28, 2026!
    const meetingDate = new Date('2026-01-18T00:00:00');
    const targetDate = new Date(meetingDate.getTime() + (100 * 24 * 60 * 60 * 1000));

    // 2. Grab HTML elements to control them with code
    const countdownEl = document.getElementById('countdown');
    const lockIcon = document.getElementById('lock-icon');
    const earlyMessage = document.getElementById('early-message');
    const cover = document.getElementById('cover');

    // 3. Logic to update the timer every second
    function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate.getTime() - now;

        // UNLOCK CONDITION: If the 100th day is here OR if the lockKeyword is NOT "Ayu"
        if (distance <= 0 || lockKeyword !== "Ayu") {
            
            // Show a special message if you are in testing mode
            if (lockKeyword !== "Ayu") {
                countdownEl.innerHTML = "Testing Mode Unlocked! 🛠️";
            } else {
                countdownEl.innerHTML = "It's time! 🎉";
            }
            
            lockIcon.innerHTML = "🔓 <br> <span style='font-size: 1rem;'>Click to open!</span>";
            
            // Allow opening the book by clicking
            cover.onclick = function() {
                cover.classList.add('open');
            };
            
        } else {
            // LOCKED CONDITION: Calculate time left
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            
            countdownEl.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
            
            // Handle clicking early (Shows the cute message temporarily)
            cover.onclick = function() {
                earlyMessage.style.opacity = 1;
                setTimeout(() => {
                    earlyMessage.style.opacity = 0;
                }, 3000);
            };
        }
    }

    // Run the timer immediately, then update it every 1000ms (1 second)
    updateTimer();
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
